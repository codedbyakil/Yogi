name: Auto Update M3U

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest playlist
        run: |
          curl -L "https://m3u.8088y.fun/testing.m3u" -o main.m3u

      - name: Commit if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add main.m3u
          git diff --cached --quiet || git commit -m "Auto update playlist"
          git push
